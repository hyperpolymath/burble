# alloyiser manifest for burble
# Burble V-lang API adapters at api/v/

[project]
name = "burble"

[[specs]]
name = "burble-v-api"
source = "/var/mnt/eclipse/repos/burble/api/v/burble.v"
format = "openapi"

[[assertions]]
name = "no-orphan-records"
check = "all r: Record | some r.owner"
scope = 5

[[assertions]]
name = "room-membership-bounded"
check = "all r: Room | #r.members <= r.capacity"
scope = 5

[[assertions]]
name = "call-requires-authenticated-user"
check = "all c: Call | all p: c.participants | p.authenticated = True"
scope = 5

[[assertions]]
name = "media-track-owner-exists"
check = "all t: MediaTrack | some t.participant"
scope = 6

[alloy]
solver = "sat4j"
max-scope = 6
